<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HARIA Failure Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- three.js for the 3D/TF panel (loaded lazily-ish; panel degrades if absent) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>window.HARIA_API = '';  /* same origin — the backend serves this page */</script>
<script src="/static/sidebar.js"  type="text/babel" data-presets="react"></script>
<script src="/static/panels.js"   type="text/babel" data-presets="react"></script>
<script src="/static/timeline.js" type="text/babel" data-presets="react"></script>
<script src="/static/explorer.js" type="text/babel" data-presets="react"></script>

<script type="text/babel" data-presets="react">
(function () {
const { useState, useEffect, useRef } = React;
const API = window.HARIA_API;

// ── Annotation categories (shared) ────────────────────────────────────
// Loaded once from the backend; timeline/panels/explorer read the window
// globals so every surface colors annotations consistently.
window.HARIA_ANN_CATEGORIES = [];
window.HariaCatColor = function (categoryId) {
  const c = (window.HARIA_ANN_CATEGORIES || []).find(c => c.id === categoryId);
  return c ? c.color : null;
};
window.HariaCatLabel = function (categoryId) {
  const c = (window.HARIA_ANN_CATEGORIES || []).find(c => c.id === categoryId);
  return c ? c.label : (categoryId || '');
};
async function loadCategories() {
  try {
    const r = await fetch(`${API}/recordings/annotations/categories`);
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d)) window.HARIA_ANN_CATEGORIES = d;
    }
  } catch {}
}
window.HariaAddCategory = async function (label, color) {
  const r = await fetch(`${API}/recordings/annotations/categories`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label, color }),
  });
  if (!r.ok) throw new Error((await r.text()) || `HTTP ${r.status}`);
  const d = await r.json();
  if (Array.isArray(d)) window.HARIA_ANN_CATEGORIES = d;
  return window.HARIA_ANN_CATEGORIES;
};

// ── Home ──────────────────────────────────────────────────────────────
function Home({ onRecord, onPlayback, onAnnotations, onOpenRecording }) {
  const [recordings, setRecordings] = useState([]);
  const [loaded, setLoaded] = useState(false);
  // Height of the cards grid in px; null = natural height. Persisted so the
  // chosen split between cards and the recordings list survives reloads.
  const [cardsH, setCardsH] = useState(() => {
    const v = parseInt(localStorage.getItem('haria_home_split') || '', 10);
    return Number.isFinite(v) ? v : null;
  });
  const cardsRef = useRef();

  function onDividerDown(e) {
    e.preventDefault();
    const startY = e.clientY;
    const startH = cardsRef.current ? cardsRef.current.getBoundingClientRect().height : 0;
    function onMove(e2) {
      const h = Math.round(Math.max(64, Math.min(window.innerHeight * 0.7, startH + e2.clientY - startY)));
      setCardsH(h);
      localStorage.setItem('haria_home_split', String(h));
    }
    function onUp() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }

  function resetDivider() {
    setCardsH(null);
    localStorage.removeItem('haria_home_split');
  }

  useEffect(() => {
    fetch(`${API}/recordings`)
      .then(r => r.ok ? r.json() : [])
      .then(arr => {
        if (!Array.isArray(arr)) return;
        const usable = arr.filter(r => r.has_metadata || (r.mcap_files || []).length > 0);
        usable.sort((a, b) => (b.start_time_ns || 0) - (a.start_time_ns || 0));
        setRecordings(usable);
      })
      .catch(() => {})
      .finally(() => setLoaded(true));
  }, []);

  function fmtDate(ns) {
    if (!ns) return '—';
    const d = new Date(ns / 1e6);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  return (
    <div className="mode-screen fade-in">
      <div className="mode-top">
        <div className="brand">HARIA</div>
        <div className="brand-sub">Failure Dashboard · ROS 2 Jazzy</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div className="mode-cards" ref={cardsRef}
             style={{ gridTemplateColumns:'1fr 1fr 1fr', flexShrink:0,
                      height: cardsH != null ? cardsH : 'auto', overflow:'hidden' }}>
          <div className="mode-card" style={{ padding:'34px 40px' }} onClick={onRecord}>
            <div className="card-num">01 / RECORD</div>
            <div className="card-line" />
            <div className="card-title">Record</div>
            <div className="card-desc">Capture live ROS 2 topics to a new .mcap recording, with live scrubbing and annotation.</div>
          </div>
          <div className="mode-card" style={{ padding:'34px 40px' }} onClick={onPlayback}>
            <div className="card-num">02 / PLAYBACK</div>
            <div className="card-line" />
            <div className="card-title">Playback</div>
            <div className="card-desc">Upload an external bag, or open a local recording from the list below.</div>
          </div>
          <div className="mode-card" style={{ padding:'34px 40px' }} onClick={onAnnotations}>
            <div className="card-num">03 / ANNOTATIONS</div>
            <div className="card-line" />
            <div className="card-title">Annotations</div>
            <div className="card-desc">Search every annotations.json across recordings — group by name, count occurrences, jump to the moment.</div>
          </div>
        </div>

        {/* Draggable divider — drag to resize the split, double-click to reset */}
        <div
          onMouseDown={onDividerDown}
          onDoubleClick={resetDivider}
          title="Drag to resize · double-click to reset"
          style={{ height:10, flexShrink:0, cursor:'ns-resize', borderTop:'2px solid var(--black)',
                   display:'flex', alignItems:'center', justifyContent:'center', userSelect:'none' }}
          onMouseEnter={e => e.currentTarget.style.background = 'var(--g6)'}
          onMouseLeave={e => e.currentTarget.style.background = ''}
        >
          <div style={{ width:36, height:3, background:'var(--g4)' }} />
        </div>

        {/* Local recordings */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
          <div style={{ padding:'12px 48px', borderBottom:'1px solid var(--black)', fontFamily:'var(--mono)',
                        fontSize:9, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--g3)',
                        display:'flex', justifyContent:'space-between' }}>
            <span>Local recordings</span>
            <span>{recordings.length}</span>
          </div>
          <div style={{ flex:1, overflowY:'auto' }}>
            {loaded && recordings.length === 0 && (
              <div style={{ padding:'24px 48px', fontFamily:'var(--mono)', fontSize:11, color:'var(--g3)' }}>
                No recordings yet — start with 01 / Record.
              </div>
            )}
            {recordings.map(rec => (
              <div key={rec.name}
                onClick={() => onOpenRecording(rec.name)}
                title="Open in playback"
                style={{ display:'flex', alignItems:'baseline', gap:18, padding:'10px 48px', cursor:'pointer',
                         borderBottom:'1px solid var(--g5)', fontFamily:'var(--mono)', fontSize:12 }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--g6)'}
                onMouseLeave={e => e.currentTarget.style.background = ''}
              >
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{rec.name}</span>
                <span style={{ color:'var(--g3)', fontSize:10 }}>{fmtDate(rec.start_time_ns)}</span>
                <span style={{ color:'var(--g3)', fontSize:10, width:70, textAlign:'right' }}>
                  {rec.duration_ns ? `${(rec.duration_ns / 1e9).toFixed(1)}s` : '—'}
                </span>
                <span style={{ color:'var(--g3)', fontSize:10, width:78, textAlign:'right' }}>
                  {(rec.size_bytes / 1e6).toFixed(1)} MB
                </span>
                <span style={{ color:'var(--g3)', fontSize:10, width:56, textAlign:'right' }}>
                  {rec.annotation_count != null ? `${rec.annotation_count} ann` : ''}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="mode-bottom">
        <div className="ver">HARIA Failure Dashboard · v2.1</div>
        <div className="ver">ROS 2 Jazzy · Universal Topic Viewer</div>
      </div>
    </div>
  );
}

// ── Record Setup ──────────────────────────────────────────────────────
function RecordSetup({ onStart, onBack }) {
  const [name, setName]       = useState('session');
  const [topics, setTopics]   = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState('');
  async function start() {
    setLoading(true); setErr('');
    try {
      const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      const body = { name: `${name || 'session'}_${ts}`, topics: [] };
      if (topics.trim()) body.topics = topics.trim().split(/[\s\n]+/).filter(Boolean);
      const r = await fetch(`${API}/recordings/start`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (!r.ok) throw new Error(await r.text());
      onStart('record');
    } catch(e) { setErr(String(e)); }
    setLoading(false);
  }
  return (
    <div className="setup-screen fade-in">
      <div className="setup-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <h1>Configure Recording</h1>
      </div>
      <div className="setup-body">
        <div className="setup-form">
          <div className="form-row">
            <label>Session Name</label>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="session" />
            <div className="hint">Saved to recordings/&lt;name&gt;_&lt;timestamp&gt; (.mcap + metadata.yaml + annotations.json)</div>
          </div>
          <div className="form-row">
            <label>Topics — leave blank to record all</label>
            <textarea value={topics} onChange={e => setTopics(e.target.value)} placeholder={"/joint_states\n/camera/image_raw"} />
            <div className="hint">One per line. Blank = subscribe to everything.</div>
          </div>
          {err && <div className="err-row">{err}</div>}
          <div className="form-actions">
            <button className="btn" onClick={onBack}>Cancel</button>
            <button className="btn primary" onClick={start} disabled={loading}>{loading ? 'Starting…' : '⏺  Start Recording'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Playback Upload ───────────────────────────────────────────────────
function PlaybackUpload({ onStart, onBack, autoOpen }) {
  const [uploadStatus, setUploadStatus] = useState('Drop a bag file to upload');
  const [statusType, setStatusType]     = useState('');
  const [procState, setProcState]       = useState('idle');
  const [procMsg, setProcMsg]           = useState('');
  const [dragging, setDragging]         = useState(false);
  const [recordings, setRecordings]     = useState([]);
  const fileRef = useRef();
  const pollRef = useRef();

  useEffect(() => {
    fetch(`${API}/recordings`)
      .then(r => r.ok ? r.json() : [])
      .then(arr => {
        if (!Array.isArray(arr)) return;
        const usable = arr.filter(r => r.has_metadata || (r.mcap_files || []).length > 0);
        usable.sort((a, b) => (b.start_time_ns || 0) - (a.start_time_ns || 0));
        setRecordings(usable);
      })
      .catch(() => {});
  }, []);

  function startPolling() {
    setProcState('processing'); setProcMsg('Processing bag…');
    clearInterval(pollRef.current);
    pollRef.current = setInterval(async () => {
      try {
        const r2 = await fetch(`${API}/playback/status`);
        const d2 = await r2.json();
        setProcState(d2.state); setProcMsg(d2.progress || d2.error || '');
        if (d2.state === 'ready' || d2.state === 'error') clearInterval(pollRef.current);
      } catch {}
    }, 800);
  }

  async function upload(file) {
    setUploadStatus(`Uploading ${file.name}…`); setStatusType(''); setProcState('idle');
    const fd = new FormData(); fd.append('file', file);
    try {
      const r = await fetch(`${API}/playback/upload`, { method:'POST', body:fd });
      if (!r.ok) throw new Error(await r.text());
      const d = await r.json();
      setUploadStatus(`Uploaded → ${d.path}`); setStatusType('ok');
      startPolling();
    } catch(e) { setUploadStatus(String(e)); setStatusType('err'); }
  }

  async function openRecording(name) {
    setUploadStatus(`Opening ${name}…`); setStatusType(''); setProcState('idle');
    try {
      const r = await fetch(`${API}/playback/open`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name }),
      });
      if (!r.ok) throw new Error(await r.text());
      setUploadStatus(`Opened → ${name}`); setStatusType('ok');
      startPolling();
    } catch(e) { setUploadStatus(String(e)); setStatusType('err'); }
  }

  useEffect(() => () => clearInterval(pollRef.current), []);

  // Arriving from the home list or the annotations explorer: open immediately
  useEffect(() => { if (autoOpen) openRecording(autoOpen); }, []);

  const pct = (() => { const m = procMsg.match(/(\d+)%/); return m ? m[1] + '%' : '8%'; })();

  return (
    <div className="upload-screen fade-in">
      <div className="setup-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <h1>Upload Bag</h1>
      </div>
      <div className="upload-body">
        <div className="upload-inner">
          {recordings.length > 0 && (
            <div style={{ marginBottom: 22 }}>
              <div className="upload-title">Open a recording</div>
              <div style={{ border:'1px solid var(--black)', maxHeight:190, overflowY:'auto' }}>
                {recordings.map(rec => (
                  <div key={rec.name}
                    onClick={() => openRecording(rec.name)}
                    style={{ display:'flex', justifyContent:'space-between', gap:12,
                             padding:'9px 12px', cursor:'pointer',
                             borderBottom:'1px solid var(--g5)',
                             fontFamily:'var(--mono)', fontSize:12 }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--g6)'}
                    onMouseLeave={e => e.currentTarget.style.background = ''}
                  >
                    <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{rec.name}</span>
                    <span style={{ color:'var(--g3)', flexShrink:0 }}>
                      {rec.duration_ns ? `${(rec.duration_ns / 1e9).toFixed(1)}s · ` : ''}
                      {(rec.size_bytes / 1e6).toFixed(1)} MB
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="upload-title">{recordings.length > 0 ? 'Or upload a bag file' : 'Select ROS 2 bag file'}</div>
          <div className={`drop-zone${dragging ? ' drag-over' : ''}`}
            onClick={() => fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) upload(f); }}
          >
            <div className="dz-icon">UPLOAD</div>
            <div className="dz-main">Drop here or click to browse</div>
            <div className="dz-sub">.db3 · .mcap · .zip · .tar.gz</div>
            <input ref={fileRef} type="file" style={{ display:'none' }} onChange={e => { if (e.target.files[0]) upload(e.target.files[0]); }} />
          </div>
          <div className={`status-bar ${statusType}`}>{uploadStatus}</div>
          {procState === 'processing' && (
            <div className="processing-bar">
              <span>{procMsg}</span>
              <div className="proc-progress"><div className="proc-fill" style={{ width: pct, animation: procMsg.includes('%') ? 'none' : undefined }} /></div>
            </div>
          )}
          {procState === 'error'  && <div className="err-row">{procMsg}</div>}
          {procState === 'ready'  && <div className="status-bar ok">✓ Ready to open</div>}
          <div className="form-actions">
            <button className="btn" onClick={onBack}>Cancel</button>
            <button className="btn primary" onClick={() => onStart('playback')} disabled={procState !== 'ready'}>▶  Open Dashboard</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────
function Dashboard({ mode, onStop }) {
  const [topicIndex, setTopicIndex]     = useState([]);
  const [tStart, setTStart]             = useState(null);
  const [tEnd, setTEnd]                 = useState(null);
  const [currentTime, setCurrentTime]   = useState(null);
  const [openTopics, setOpenTopics]     = useState(new Set());
  const [annotations, setAnnotations]   = useState([]);
  const [annCollapsed, setAnnCollapsed] = useState(false);
  // Annotations persist as annotations.json next to the bag's .mcap/metadata.yaml.
  // savedRef holds the last state known to be on disk; Stop prompts if they differ.
  const savedRef = useRef('[]');

  useEffect(() => {
    fetch(`${API}/session/annotations`)
      .then(r => r.ok ? r.json() : [])
      .then(arr => {
        if (Array.isArray(arr)) { savedRef.current = JSON.stringify(arr); setAnnotations(arr); }
      })
      .catch(() => {});
  }, []);

  // Warn before closing the tab with unsaved annotation changes.
  useEffect(() => {
    function onBeforeUnload(e) {
      if (JSON.stringify(annotations) !== savedRef.current) {
        e.preventDefault(); e.returnValue = '';
      }
    }
    window.addEventListener('beforeunload', onBeforeUnload);
    return () => window.removeEventListener('beforeunload', onBeforeUnload);
  }, [annotations]);

  async function saveAnnotations() {
    const body = JSON.stringify(annotations);
    const r = await fetch(`${API}/session/annotations`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body,
    });
    if (!r.ok) throw new Error(await r.text());
    savedRef.current = body;
  }

  useEffect(() => {
    async function poll() {
      try {
        const r = await fetch(`${API}/topics/index`);
        if (!r.ok) return;
        const d = await r.json();
        setTopicIndex(d.topics || []);
        if (d.t_start) setTStart(d.t_start);
        if (d.t_end)   setTEnd(d.t_end);
      } catch {}
    }
    poll();
    const t = setInterval(poll, 1500);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const t = setInterval(() => {
      const next = window._hariaOpenTopics;
      if (!next) return;
      // Only trigger a re-render when the set actually changed
      setOpenTopics(prev =>
        prev.size === next.size && [...next].every(x => prev.has(x)) ? prev : new Set(next)
      );
    }, 500);
    return () => clearInterval(t);
  }, []);

  function handleAddPanel(meta, type) { if (window._hariaAddPanel) window._hariaAddPanel(meta, type); }
  function handleAddAnnotation(ann)   { setAnnotations(a => [...a, ann]); setAnnCollapsed(false); }
  function handleDeleteAnnotation(id) { setAnnotations(a => a.filter(a => a.id !== id)); }
  function handleImport(arr) { setAnnotations(a => [...a, ...arr]); }
  function handleExport() {
    const blob = new Blob([JSON.stringify(annotations, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'haria_annotations.json'; a.click();
    URL.revokeObjectURL(url);
  }
  async function handleStop() {
    if (JSON.stringify(annotations) !== savedRef.current) {
      if (confirm('Save annotation changes to annotations.json before stopping?')) {
        try {
          await saveAnnotations();
        } catch (e) {
          if (!confirm(`Saving failed (${e}). Stop anyway and lose the changes?`)) return;
        }
      }
    }
    await fetch(`${API}${mode === 'record' ? '/recordings/stop' : '/playback/stop'}`, { method:'POST' }).catch(() => {});
    onStop();
  }

  return (
    <div className="dashboard fade-in">
      <div className="topbar" style={{ gridColumn:'1 / -1' }}>
        <div className="tb-cell"><div className="tb-brand">HARIA</div></div>
        <div className="tb-cell">
          <div className="tb-label">Mode</div>
          <div className="tb-value"><span className="tb-dot" />{mode === 'record' ? 'Recording' : 'Playback'}</div>
        </div>
        <div className="tb-cell">
          <div className="tb-label">Topics</div>
          <div className="tb-value">{topicIndex.length} · {topicIndex.filter(t => t.active).length} active</div>
        </div>
        <div className="tb-cell">
          <div className="tb-label">Panels</div>
          <div className="tb-value">{openTopics.size}</div>
        </div>
        <div className="tb-spacer" />
      </div>

      <window.HariaSidebar
        topicIndex={topicIndex}
        openTopics={openTopics}
        onAddPanel={handleAddPanel}
      />

      <window.HariaPanelArea
        topicIndex={topicIndex}
        currentTime={currentTime}
      />

      <window.HariaAnnotationsSidebar
        annotations={annotations}
        onDelete={handleDeleteAnnotation}
        onImport={handleImport}
        onExport={handleExport}
        collapsed={annCollapsed}
        onToggle={() => setAnnCollapsed(v => !v)}
      />

      <window.HariaTimelineContainer
        mode={mode}
        tStart={tStart}
        tEnd={tEnd}
        topicIndex={topicIndex}
        onTimeChange={setCurrentTime}
        onStop={handleStop}
        annotations={annotations}
        onAddAnnotation={handleAddAnnotation}
        annCollapsed={annCollapsed}
        onToggleAnn={() => setAnnCollapsed(v => !v)}
      />
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]     = useState('home');
  const [mode, setMode]         = useState(null);
  const [autoOpen, setAutoOpen] = useState(null);

  useEffect(() => { loadCategories(); }, []);

  function openRecording(name, seekT) {
    // A pending seek target is honoured by the timeline once the session loads
    window._hariaSeekTo = (seekT != null && isFinite(seekT)) ? seekT : null;
    setAutoOpen(name);
    setMode('playback');
    setScreen('playback-upload');
  }
  function goHome() { setMode(null); setAutoOpen(null); setScreen('home'); }

  return (
    <>
      {screen === 'home' && (
        <Home
          onRecord={() => { setMode('record'); setScreen('record-setup'); }}
          onPlayback={() => { setMode('playback'); setAutoOpen(null); setScreen('playback-upload'); }}
          onAnnotations={() => setScreen('annotations')}
          onOpenRecording={openRecording}
        />
      )}
      {screen === 'annotations' && (
        <window.HariaAnnotationsExplorer onBack={goHome} onOpenRecording={openRecording} />
      )}
      {screen === 'record-setup'    && <RecordSetup    onStart={m => { setMode(m); setScreen('dashboard'); }} onBack={goHome} />}
      {screen === 'playback-upload' && <PlaybackUpload onStart={m => { setMode(m); setScreen('dashboard'); }} onBack={goHome} autoOpen={autoOpen} />}
      {screen === 'dashboard'       && <Dashboard mode={mode} onStop={goHome} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
